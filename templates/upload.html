<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Analyzer</title>

    <!-- Bootstrap + Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .btn-primary {
            background: #4f46e5;
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        #uploadProgress {
            width: 100%;
            height: 8px;
            display: none;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-box {
            border-radius: 12px;
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
        }

        .sentiment-box {
            background: #ecfdf5;
            border: 1px solid #d1fae5;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-family: inherit;
        }

        h2 {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center">
    <div class="col-md-6 mt-5">

        <div class="card p-4">
            <h2 class="text-center mb-4">🎤 Audio Analyzer</h2>

            <form id="uploadForm" action="{{ url_for('upload_file') }}" method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <input type="file" class="form-control" name="file" id="file">
                </div>

                <progress id="uploadProgress" value="0" max="100"></progress>

                <button type="submit" class="btn btn-primary w-100 mt-3">
                    Upload & Analyze
                </button>
            </form>
        </div>

        <div id="progressMessage" class="alert alert-info text-center mt-4" style="display:none;">
            ⏳ Processing audio... this may take a few seconds
        </div>

        <div id="resultSection" class="mt-4"></div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){
    $('#uploadForm').submit(function(e){
        e.preventDefault();

        var formData = new FormData($(this)[0]);

        $('#uploadProgress').show();
        $('#progressMessage').show();
        $('#resultSection').html("");

        $.ajax({
            url: $(this).attr('action'),
            type: 'POST',
            data: formData,
            async: true,
            xhr: function () {
                var xhr = new window.XMLHttpRequest();
                xhr.upload.addEventListener('progress', function (e) {
                    if (e.lengthComputable) {
                        var percentComplete = (e.loaded / e.total) * 100;
                        $('#uploadProgress').val(percentComplete);
                    }
                }, false);
                return xhr;
            },

            success: function (data) {
                $('#uploadProgress').hide();
                $('#progressMessage').hide();

                if (data.transcript && data.sentiment_analysis) {
                    var transcript = data.transcript.replace(/\n/g, '<br>');

                    $('#resultSection').html(`
                        <div class="card p-3 mb-3">
                            <div class="section-title">📝 Transcription</div>
                            <div class="result-box">${transcript}</div>
                        </div>

                        <div class="card p-3">
                            <div class="section-title">🧠 Sentiment Analysis</div>
                            <div class="result-box sentiment-box">
                                <pre>${data.sentiment_analysis}</pre>
                            </div>
                        </div>
                    `);

                } else if (data.error) {
                    $('#resultSection').html(`<div class="alert alert-danger">${data.error}</div>`);
                }
            },

            error: function () {
                $('#progressMessage').hide();
                $('#uploadProgress').hide();
                $('#resultSection').html('<div class="alert alert-danger">Something went wrong. Try again.</div>');
            },

            cache: false,
            contentType: false,
            processData: false
        });

        return false;
    });
});
</script>

</body>
</html>
