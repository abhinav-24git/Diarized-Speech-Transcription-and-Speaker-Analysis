<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Clean, no branding -->
    <title>Meeting Analytics Dashboard</title>

    <!-- Bootstrap CSS for grid -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container-fluid py-4 px-4 mx-auto" style="max-width: 1600px;">

    <!-- 1. Header Section (Workflow Start) -->
    <div class="glass-panel p-4 mb-4" id="uploadSectionContainer">
        <form id="uploadForm" action="{{ url_for('upload_file') }}" method="POST" enctype="multipart/form-data" class="row g-3 align-items-center justify-content-center">
            
            <div class="col-12 col-md-4">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-subtle text-muted-custom border-end-0">
                        <i class="fa-solid fa-microphone-lines"></i>
                    </span>
                    <input type="file" class="form-control modern-input border-start-0" name="file" accept=".wav,.mp3,.m4a" required>
                </div>
            </div>

            <div class="col-12 col-md-3">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-subtle text-muted-custom border-end-0">
                        <i class="fa-solid fa-tags"></i>
                    </span>
                    <input type="text" class="form-control modern-input border-start-0" name="topic" placeholder="Meeting Topic" required>
                </div>
            </div>

            <div class="col-12 col-md-3">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-subtle text-muted-custom border-end-0">
                        <i class="fa-solid fa-users"></i>
                    </span>
                    <input type="number" class="form-control modern-input border-start-0" name="num_speakers" placeholder="Speakers (Optional)" min="1" max="10">
                </div>
            </div>

            <div class="col-12 col-md-2">
                <button class="btn w-100 glow-btn py-2" id="analyzeBtn" type="submit">
                    ANALYSE
                </button>
            </div>
            
        </form>
    </div>

    <!-- Loading State -->
    <div id="loadingSection" style="display: none;" class="glass-panel text-center my-5 py-5">
        <div class="spinner-border neon-spinner" style="width: 3rem; height: 3rem;" role="status"></div>
        <h4 class="mt-4 text-main">Processing Architecture...</h4>
        <p class="text-muted-custom">Extracting vectors and embeddings.</p>
    </div>

    <!-- Main Dashboard Body -->
    <div id="resultSection" style="display: none;">
        
        <!-- 2. Top Metric Row ("At-a-Glance") -->
        <div class="row g-3 justify-content-center mb-4">
            <div class="col-12 col-md-3">
                <div class="top-metric-card">
                    <i class="fa-solid fa-bullseye metric-label-icon"></i>
                    <div class="metric-title">Intent</div>
                    <div class="metric-value" id="topIntent">--</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="top-metric-card">
                    <i class="fa-solid fa-align-left metric-label-icon" style="color: var(--accent-purple);"></i>
                    <div class="metric-title">Summary</div>
                    <div class="metric-value" style="font-size: 0.85rem;" id="topSummary">--</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="top-metric-card">
                    <i class="fa-solid fa-scale-balanced metric-label-icon" style="color: var(--sema-neu);"></i>
                    <div class="metric-title">Decision Impact</div>
                    <div class="metric-value" id="topImpact" style="margin-bottom: 8px;">--</div>
                    <!-- Success Meter -->
                    <div class="progress progress-dark" id="impactProgressContainer">
                        <div class="progress-bar" id="impactProgressBar" role="progressbar" style="width: 0%; background-color: var(--accent-cyan);"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="top-metric-card">
                    <i class="fa-solid fa-list-check metric-label-icon" style="color: var(--sema-pos);"></i>
                    <div class="metric-title">Action Items</div>
                    <div class="metric-value" style="font-size: 0.85rem;" id="topActions">--</div>
                </div>
            </div>
        </div>

        <!-- 3. The Main Analytics Body (Split View) -->
        <div class="row g-4">
            
            <!-- Left Side: Diarized Transcript (Glass Panel) -->
            <div class="col-12 col-lg-7">
                <div class="glass-panel h-100 p-4">
                    <h5 class="mb-4 text-muted-custom fs-6 text-uppercase letter-spacing">Transcript Log</h5>
                    <div id="transcriptContent" class="transcript-box pe-2">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Right Side: Visual Insights -->
            <div class="col-12 col-lg-5 d-flex flex-column gap-4">
                
                <!-- Share & Ranking Block -->
                <div class="glass-panel p-4">
                    <div class="row">
                        <!-- Left inside panel: Chart -->
                        <div class="col-5 border-end border-slate-800">
                            <h5 class="text-muted-custom fs-6 text-uppercase mb-3">Share</h5>
                            <div style="height: 160px; width: 100%;">
                                <canvas id="speakingShareChart"></canvas>
                            </div>
                        </div>
                        
                        <!-- Right inside panel: Rankings horizontally -->
                        <div class="col-7 ps-4">
                            <h5 class="text-muted-custom fs-6 text-uppercase mb-3">Rankings</h5>
                            <div id="leaderboardContainer" class="d-flex flex-column gap-3">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Speaker Deep-Dive (Accordions) -->
                <div class="glass-panel p-4 flex-grow-1">
                    <h5 class="text-muted-custom fs-6 text-uppercase mb-4">Speaker Deep Dive</h5>
                    <div id="speakerAccordions">
                        <!-- Populated iteratively by JS for each speaker -->
                    </div>
                </div>

            </div>

        </div>

        <!-- Final Interaction Comparison Box (Footer) -->
        <div class="glass-panel p-4 mt-4 mb-5">
            <h5 class="text-muted-custom fs-6 text-uppercase mb-4 text-center">Interaction Dynamics</h5>
            <div class="row g-4 align-items-center">
                <!-- Flow Chart -->
                <div class="col-12 col-md-5 border-end border-slate-800">
                    <div style="height: 250px; width: 100%;">
                        <canvas id="interactionRadarChart"></canvas>
                    </div>
                </div>
                
                <!-- Sliders / Gauges -->
                <div class="col-12 col-md-7 ps-md-5">
                    
                    <div class="mb-5">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted-custom text-uppercase fs-6"><i class="fa-solid fa-handshake-angle me-2 sw-pos"></i>Agreement</span>
                            <span class="text-muted-custom text-uppercase fs-6">Conflict<i class="fa-solid fa-bolt ms-2 sw-neg"></i></span>
                        </div>
                        <div class="progress progress-dark" style="height: 8px;">
                            <!-- Dynamically offset to show slider pos -->
                            <div id="conflictSlider" class="progress-bar bg-secondary" role="progressbar" style="width: 50%; border-radius: 8px;"></div>
                        </div>
                    </div>

                    <div>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-main fw-bold">Task Completion Estimate</span>
                            <span class="text-accent-cyan fw-bold" id="taskCompletionPct">0%</span>
                        </div>
                        <div class="progress progress-dark" style="height: 12px; border-radius: 8px; border: 1px solid var(--border-subtle);">
                            <div id="taskCompletionGauge" class="progress-bar" role="progressbar" style="width: 0%; background-color: var(--accent-cyan);"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
