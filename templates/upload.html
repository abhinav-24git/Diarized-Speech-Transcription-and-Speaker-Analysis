<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Analyzer Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container mt-5">

    <div class="card p-4 mb-4">
        <h3 class="text-center mb-3">🎤 Conversation Analyzer</h3>

        <form id="uploadForm" action="{{ url_for('upload_file') }}" method="POST" enctype="multipart/form-data">
            <input type="file" class="form-control mb-3" name="file" required>

            <input type="text" class="form-control mb-3" name="topic"
                   placeholder="Enter meeting topic (e.g., sales call)" required>

            <button class="btn btn-primary w-100">Analyze</button>
        </form>
    </div>

    <div id="resultSection"></div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
